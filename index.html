<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚦 Controle de LEDs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.min.js">
    </script>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
        }

        .header h1 span {
            color: #ff6b6b;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .status-badge .dot.online {
            background: #51cf66;
            box-shadow: 0 0 15px rgba(81, 207, 102, 0.4);
        }

        .status-badge .dot.offline {
            background: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }

        .status-badge .dot.connecting {
            background: #ffd93d;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .leds-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
        }

        .led-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .led-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            border: 3px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .led-circle:hover {
            transform: scale(1.05);
        }

        .led-circle.vermelho {
            background: #2d1b1b;
            box-shadow: inset 0 -8px 15px rgba(0, 0, 0, 0.5);
        }
        .led-circle.vermelho.on {
            background: #ff1744;
            box-shadow: 0 0 40px rgba(255, 23, 68, 0.6), 0 0 80px rgba(255, 23, 68, 0.2);
        }

        .led-circle.amarelo {
            background: #2d2b1b;
            box-shadow: inset 0 -8px 15px rgba(0, 0, 0, 0.5);
        }
        .led-circle.amarelo.on {
            background: #ffd600;
            box-shadow: 0 0 40px rgba(255, 214, 0, 0.6), 0 0 80px rgba(255, 214, 0, 0.2);
        }

        .led-circle.verde {
            background: #1b2d1b;
            box-shadow: inset 0 -8px 15px rgba(0, 0, 0, 0.5);
        }
        .led-circle.verde.on {
            background: #00e676;
            box-shadow: 0 0 40px rgba(0, 230, 118, 0.6), 0 0 80px rgba(0, 230, 118, 0.2);
        }

        .led-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .led-status-text {
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            font-weight: 400;
        }

        .led-status-text.on {
            color: #51cf66;
        }

        .led-status-text.off {
            color: rgba(255, 255, 255, 0.25);
        }

        .pino-info {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.5px;
        }

        .botoes-container {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 80px;
            padding: 14px 20px;
            border: none;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.94);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-vermelho {
            background: linear-gradient(135deg, #ff1744, #d50000);
            box-shadow: 0 4px 20px rgba(255, 23, 68, 0.25);
        }
        .btn-vermelho:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 23, 68, 0.4);
        }

        .btn-amarelo {
            background: linear-gradient(135deg, #ffd600, #f9a825);
            box-shadow: 0 4px 20px rgba(255, 214, 0, 0.25);
            color: #1a1a2e;
        }
        .btn-amarelo:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 214, 0, 0.4);
        }

        .btn-verde {
            background: linear-gradient(135deg, #00e676, #00c853);
            box-shadow: 0 4px 20px rgba(0, 230, 118, 0.25);
        }
        .btn-verde:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 230, 118, 0.4);
        }

        .btn-todos {
            background: linear-gradient(135deg, #7c4dff, #536dfe);
            box-shadow: 0 4px 20px rgba(124, 77, 255, 0.25);
            flex: 2;
        }
        .btn-todos:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(124, 77, 255, 0.4);
        }

        .btn-desligar-todos {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-desligar-todos:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-3px);
        }

        .controles-individuais {
            display: flex;
            gap: 8px;
            margin: 10px 0 15px 0;
            flex-wrap: wrap;
        }

        .btn-pequeno {
            flex: 1;
            min-width: 50px;
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .btn-pequeno:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-pequeno.ligar {
            background: rgba(81, 207, 102, 0.15);
            border: 1px solid rgba(81, 207, 102, 0.2);
            color: #51cf66;
        }
        .btn-pequeno.ligar:hover:not(:disabled) {
            background: rgba(81, 207, 102, 0.25);
        }

        .btn-pequeno.desligar {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        .btn-pequeno.desligar:hover:not(:disabled) {
            background: rgba(255, 107, 107, 0.25);
        }

        .log-container {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .log-header span {
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .log-header button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            font-size: 12px;
            transition: color 0.3s;
        }

        .log-header button:hover {
            color: rgba(255, 255, 255, 0.4);
        }

        .log {
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 80px;
            overflow-y: auto;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .log::-webkit-scrollbar {
            width: 4px;
        }
        .log::-webkit-scrollbar-track {
            background: transparent;
        }
        .log::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .log .time {
            color: rgba(255, 255, 255, 0.1);
        }
        .log .msg-ok {
            color: #51cf66;
        }
        .log .msg-erro {
            color: #ff6b6b;
        }
        .log .msg-info {
            color: #74c0fc;
        }

        /* Informações do sistema */
        .system-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-wrap: wrap;
        }

        .system-info span {
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        .system-info .valor {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        @media (max-width: 550px) {
            .container {
                padding: 25px;
            }
            .header h1 {
                font-size: 20px;
            }
            .leds-container {
                gap: 20px;
            }
            .led-circle {
                width: 65px;
                height: 65px;
                font-size: 28px;
            }
            .botoes-container {
                flex-direction: column;
            }
            .controles-individuais {
                flex-direction: column;
            }
            .btn {
                padding: 12px 16px;
                font-size: 13px;
            }
            .status-badge {
                font-size: 11px;
                padding: 6px 12px;
            }
            .system-info {
                flex-direction: column;
                align-items: center;
                gap: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== CABEÇALHO ===== -->
        <div class="header">
            <h1>🚦 <span>LED</span> Control</h1>
            <div class="status-badge">
                <span class="dot connecting" id="statusDot"></span>
                <span id="statusText">Conectando...</span>
            </div>
        </div>

        <!-- ===== LEDs ===== -->
        <div class="leds-container">
            <div class="led-item">
                <div class="led-circle vermelho" id="ledVermelho">🔴</div>
                <span class="led-label">Vermelho</span>
                <span class="led-status-text off" id="statusVermelho">Pino 7 • Desligado</span>
            </div>
            <div class="led-item">
                <div class="led-circle amarelo" id="ledAmarelo">🟡</div>
                <span class="led-label">Amarelo</span>
                <span class="led-status-text off" id="statusAmarelo">Pino 8 • Desligado</span>
            </div>
            <div class="led-item">
                <div class="led-circle verde" id="ledVerde">🟢</div>
                <span class="led-label">Verde</span>
                <span class="led-status-text off" id="statusVerde">Pino 9 • Desligado</span>
            </div>
        </div>

        <!-- ===== BOTÕES PRINCIPAIS ===== -->
        <div class="botoes-container">
            <button class="btn btn-todos" id="btnTodosLigar" disabled>⚡ Ligar Todos</button>
            <button class="btn btn-desligar-todos" id="btnTodosDesligar" disabled>⏻ Desligar Todos</button>
        </div>

        <!-- ===== CONTROLES INDIVIDUAIS ===== -->
        <div class="controles-individuais">
            <button class="btn-pequeno ligar" id="btnVLigar" disabled>🔴 Ligar</button>
            <button class="btn-pequeno desligar" id="btnVDesligar" disabled>🔴 Desl.</button>
            <button class="btn-pequeno ligar" id="btnALigar" disabled>🟡 Ligar</button>
            <button class="btn-pequeno desligar" id="btnADesligar" disabled>🟡 Desl.</button>
            <button class="btn-pequeno ligar" id="btnGLigar" disabled>🟢 Ligar</button>
            <button class="btn-pequeno desligar" id="btnGDesligar" disabled>🟢 Desl.</
